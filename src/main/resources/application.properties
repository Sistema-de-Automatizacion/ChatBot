spring.application.name=motosdelcaribe

# Default 8081 en dev para no chocar con el Backend de cartera (8080).
# En Render/Azure App Service la plataforma setea PORT y sobrescribe este default.
server.port=${PORT:8081}

# Import optional .env file (parsed as properties) so local developers
# can define DB_URL, DB_USERNAME and DB_PASSWORD without setting OS env vars.
spring.config.import=optional:file:.env[.properties]

# URL de conexion
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# `update` deja que Hibernate cree las tablas faltantes (chat_session, chat_error)
# y agregue columnas nuevas que aparezcan en las entidades en el futuro. NO borra
# columnas ni tablas — para esos cambios destructivos hay que pasar por una
# migracion explicita. La vista vw_sv_all_motos_semanal NO se toca porque Client
# la mapea con @Subselect, que Hibernate trata como read-only sin DDL.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# API key compartida con n8n. Cada POST a /api/** debe traer X-API-Key con este valor.
# En produccion debe ser un string random >= 32 chars; el default solo sirve para
# desarrollo local y para que los tests arranquen sin necesidad de un .env.
app.api-key=${APP_API_KEY:local-dev-key-1234}

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
