spring.application.name=motosdelcaribe

# Default 8081 en dev para no chocar con el Backend de cartera (8080).
# En Render/Azure App Service la plataforma setea PORT y sobrescribe este default.
server.port=${PORT:8081}

# Import optional .env file (parsed as properties) so local developers
# can define DB_URL, DB_USERNAME and DB_PASSWORD without setting OS env vars.
spring.config.import=optional:file:.env[.properties]

# URL de conexion
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# `none` evita que Hibernate intente crear/alterar tablas en la BD; el ChatBot
# lee de una vista existente (vw_sv_all_motos_semanal) y administra su unica
# tabla propia (chat_session) con migraciones explicitas en schema.sql.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Migraciones de schema simples e idempotentes en src/main/resources/schema.sql.
# Se ejecuta en cada arranque; usa CREATE ... IF NOT EXISTS para no romper en startups posteriores.
spring.sql.init.mode=always

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
