spring.application.name=motosdelcaribe

# Default 8081 en dev para no chocar con el Backend de cartera (8080).
# En Render/Azure App Service la plataforma setea PORT y sobrescribe este default.
server.port=${PORT:8081}

# Import optional .env file (parsed as properties) so local developers
# can define DB_URL, DB_USERNAME and DB_PASSWORD without setting OS env vars.
spring.config.import=optional:file:.env[.properties]

# URL de conexion
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# `none` evita que Hibernate intente crear/alterar tablas en la BD; el ChatBot
# va a leer de una vista existente (vw_sv_all_motos_semanal) y la unica tabla
# nueva (chat_session) se creara con migracion explicita en una PR posterior.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true
